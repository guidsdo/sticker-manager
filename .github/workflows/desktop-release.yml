name: Build Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            os: macos-latest
            artifact: desktop-release-macos
            command: pnpm --filter @ima-stickermanage/desktop exec electron-builder --mac dmg --publish never
          - name: Windows
            os: windows-latest
            artifact: desktop-release-windows
            command: pnpm --filter @ima-stickermanage/desktop exec electron-builder --win nsis --publish never
          - name: Linux
            os: ubuntu-latest
            artifact: desktop-release-linux
            command: pnpm --filter @ima-stickermanage/desktop exec electron-builder --linux AppImage --publish never
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build desktop app
        run: pnpm --filter @ima-stickermanage/desktop build

      - name: Package desktop app
        run: ${{ matrix.platform.command }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform.artifact }}
          path: packages/desktop/release/**

  release:
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
